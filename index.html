<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Guess My Number</title>

    <!-- * Google Fonts | "Press Start 2P" -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet" />

    <!-- * Asset Links -->
    <link rel="stylesheet" href="main.css"/>
    <script src="main.js" defer></script>
  </head>
  <body>
    <!-- * Header -->
    <header class="header">
      <seciton class="header-top">
        <button class="btn game-again" href="#" data-again-btn>Again!</button>
        <p class="game-rules">(Between 1 and 20)</p>
      </seciton>

      <h1 class="header-head">Guess My Number!</h1>
      <span class="guess-placeholder" data-guess-placeholder>?</span>
    </header>

    <!-- * Main -->
    <main>
      <section class="left">
        <form data-check-form>
          <input type="Number" class="guess" data-player-guess/>
          <button class="btn check" type="submit">Check!</button>
        </form>
      </section>
      <section class="right">
        <p class="message" data-display-message>Start guessing...</p>
        <p class="label-score">💯 Score: <span class="score" data-player-score>20</span></p>
        <p class="label-highscore"> 
          🥇 Highscore: <span class="highscore" data-player-high-score>0</span>
        </p>
      </section>
    </main>
  </body>
</html>
